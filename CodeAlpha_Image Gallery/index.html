<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>My Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
  <button data-filter="all">All</button>
  <button data-filter="nature">Nature</button>
  <button data-filter="city">City</button>
</div>

<!-- Gallery -->
<div class="gallery">
  <img src="https://picsum.photos/id/1018/600/400" class="gallery-item nature" data-category="nature" alt="Forest path" loading="lazy">
  <img src="https://picsum.photos/id/1015/600/400" class="gallery-item nature" data-category="nature" alt="Mountain" loading="lazy">
  <img src="https://picsum.photos/id/1011/600/400" class="gallery-item city" data-category="city" alt="City skyline" loading="lazy">
  <img src="https://picsum.photos/id/1012/600/400" class="gallery-item city" data-category="city" alt="Street at night" loading="lazy">
</div>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-hidden="true" aria-label="Image preview" tabindex="-1">
  <button class="close" aria-label="Close">×</button>
  <button class="prev" aria-label="Previous image">&lt;</button>
  <img id="lightbox-img" alt="Preview image">
  <button class="next" aria-label="Next image">&gt;</button>
</div>

<script src="script.js"></script>
</body>
</html>
